<p-confirmDialog></p-confirmDialog>

<ngx-spinner bdColor="rgba(15, 23, 42, 0.85)" size="medium" color="#fff" type="ball-clip-rotate" [fullScreen]="true">
  <p style="color: white; margin-top: 15px;">Giriş yapılıyor...</p>
</ngx-spinner>


@if (authService.isLoggedIn()) {
<div class="layout">
  <app-sidebar></app-sidebar>

  <div class="content">
    <router-outlet></router-outlet>
  </div>
</div>
} @else {
<router-outlet></router-outlet>
}
